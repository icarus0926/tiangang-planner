<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>天罡日程 2.0</title>
<style>
  :root{
    --bg:#f6f5f3; --card:#ffffff; --border:#ececec; --text:#1f1f1f;
    --text2:#77716b; --text3:#a8a29b;
    --blue:#3b82d6; --orange:#e8833a; --green:#3da56b; --red:#d6534f;
    --purple:#8b62c9; --gray:#9ca3af;
    --shadow:0 1px 3px rgba(0,0,0,.04),0 4px 14px rgba(0,0,0,.04);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;line-height:1.55;}
  .app{display:flex;min-height:100vh}
  .side{width:210px;flex:none;background:var(--card);border-right:1px solid var(--border);
    padding:24px 14px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:6px;}
  .brand{font-size:16px;font-weight:700;padding:4px 12px 16px;letter-spacing:.5px}
  .brand .yr{color:var(--text3);font-weight:500;font-size:13px;display:block;margin-top:2px}
  .nav{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:9px;
    font-size:14.5px;color:var(--text2);cursor:pointer;transition:all .13s;user-select:none}
  .nav:hover{background:#f2f1ef;color:var(--text)}
  .nav.on{background:var(--text);color:#fff;font-weight:600}
  .nav .ic{font-size:16px;width:20px;text-align:center}
  .side .foot{margin-top:auto;font-size:11.5px;color:var(--text3);padding:0 12px;line-height:1.7}
  .side .rbtn{margin:8px 12px 0;font-size:12px;padding:7px;border:1px solid var(--border);border-radius:8px;
    text-align:center;cursor:pointer;color:var(--text2)}
  .side .rbtn:hover{background:#f2f1ef}
  .main{flex:1;min-width:0;padding:34px 34px 60px;max-width:1220px}
  .page{display:none;animation:fade .22s ease}.page.on{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .phead{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:22px}
  .phead h1{font-size:23px;font-weight:700;letter-spacing:.5px;display:flex;align-items:center}
  .phead .sub{font-size:13px;color:var(--text3)}
  .tnav{display:inline-flex;align-items:center;gap:6px;margin-left:16px}
  .tbtn{width:27px;height:27px;border-radius:50%;border:1px solid var(--border);background:#fff;cursor:pointer;
    font-size:15px;color:var(--text2);line-height:1;padding:0;transition:all .12s}
  .tbtn:hover{background:#f1efec;color:var(--text)}
  .tbtn.td{width:auto;padding:0 12px;border-radius:14px;font-size:12.5px}
  .rollbtn{padding:4px 12px;border:1px solid var(--border);border-radius:14px;background:#fff;
    font-size:12px;color:var(--text2);cursor:pointer;font-weight:500;transition:all .12s}
  .rollbtn:hover{background:#fdf3e7;border-color:#e8b27a;color:#b3742f}
  h2{font-size:16px;font-weight:650;margin:28px 0 13px;display:flex;align-items:center;gap:8px}
  h2:first-of-type{margin-top:6px}
  h2 .bar{width:4px;height:15px;border-radius:2px;background:var(--blue)}
  h2 .cnt{font-size:12.5px;color:var(--text3);font-weight:400}
  h2 .hbtns{margin-left:auto;display:flex;gap:8px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow)}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px}
  .kpi{padding:18px 20px}.kpi .num{font-size:29px;font-weight:700}.kpi .lab{font-size:13px;color:var(--text2);margin-top:2px}
  .kpi .sub{font-size:12px;color:var(--text3);margin-top:6px}
  /* 视图切换 甘特|大纲 */
  .vswitch{display:inline-flex;border:1px solid var(--border);border-radius:16px;overflow:hidden;background:#fff}
  .vswitch span{padding:5px 14px;font-size:12.5px;color:var(--text2);cursor:pointer;transition:all .12s}
  .vswitch span.on{background:var(--text);color:#fff;font-weight:600}
  /* 目标卡 */
  .goals{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:14px}
  .goal{padding:16px 18px;display:flex;flex-direction:column;gap:8px}
  .goal .top{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .dot{width:9px;height:9px;border-radius:50%;flex:none}
  .goal .name{font-weight:600;font-size:14.5px;min-width:0}
  .tag{font-size:11.5px;padding:1px 9px;border-radius:20px;flex:none}
  .tag.todo{background:#f1f0ee;color:#8a847d}.tag.doing{background:#e3edf9;color:#2f6bb3}.tag.done{background:#e2f3e8;color:#2e7d4f}
  .goal .crit{font-size:12.5px;color:var(--text2)}
  .pbar{height:6px;border-radius:3px;background:#f0efed;overflow:hidden}
  .pbar i{display:block;height:100%;border-radius:3px;background:var(--blue)}
  .goal .pctline{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3)}
  .pin{width:52px;padding:2px 6px;border:1px solid var(--border);border-radius:6px;font-size:12px;text-align:right}
  .xbtn{width:20px;height:20px;line-height:18px;text-align:center;border-radius:50%;cursor:pointer;font-size:13px;
    color:var(--text3);opacity:.45;transition:all .12s;flex:none;user-select:none}
  .xbtn:hover{background:#fbe9e7;color:#c04531;opacity:1}
  .ebtn{width:20px;height:20px;line-height:18px;text-align:center;border-radius:50%;cursor:pointer;font-size:12px;
    color:var(--text3);opacity:.45;transition:all .12s;flex:none;user-select:none}
  .ebtn:hover{background:#f4ecd9;color:#9a6b1f;opacity:1}
  .goal:hover .xbtn,.goal:hover .ebtn{opacity:1}
  .addline{display:flex;gap:8px;margin-top:6px}
  .addline input,.addline select{padding:7px 11px;border:1px solid var(--border);border-radius:8px;font-size:13px}
  .addline input{flex:1;min-width:0}
  .addline button{padding:7px 14px;border:none;border-radius:8px;background:var(--text);color:#fff;font-size:12.5px;cursor:pointer;flex:none}
  .ghostbtn{padding:6px 14px;border:1px dashed #d8d4cf;border-radius:16px;background:transparent;font-size:12.5px;
    color:var(--text2);cursor:pointer;transition:all .12s}
  .ghostbtn:hover{border-color:var(--text2);color:var(--text)}
  /* 任务池:优先级分层 */
  .pool{padding:18px;margin-bottom:14px}
  .poolhead{display:flex;align-items:baseline;gap:10px;margin-bottom:12px}
  .pool h3{font-size:15px;font-weight:650}
  .pool .cnt{font-size:12.5px;color:var(--text3)}
  .badge{font-size:11px;padding:0 7px;border-radius:10px;flex:none;font-weight:600;cursor:pointer;user-select:none}
  .P0{background:#fbe9e7;color:#c04531}.P1{background:#fdf1e3;color:#b2701f}.P2{background:#f1f0ee;color:#8a847d}.Px{background:#f1f0ee;color:#b5aea6}
  .poollayers{display:flex;flex-direction:column;gap:12px}
  .pool-layer{display:flex;align-items:flex-start;gap:10px}
  .pl-lab{flex:none;width:30px;font-size:12px;font-weight:600;color:var(--text3);padding-top:7px}
  .pl-cards{flex:1;display:flex;flex-wrap:wrap;gap:8px;min-width:0}
  .pcard{display:inline-flex;align-items:center;gap:5px;padding:6px 8px 6px 10px;border:1px solid var(--border);border-radius:20px;
    background:#fff;font-size:12.5px;max-width:380px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
  .pcard .pc-t{flex:0 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .pcard .ab{min-width:20px;width:auto;padding:0 3px;height:20px;line-height:18px;text-align:center;border-radius:10px;cursor:pointer;font-size:13px;
    color:var(--text3);opacity:.5;transition:all .12s;flex:none;user-select:none;white-space:nowrap}
  .pcard:hover .ab{opacity:1}
  .ab.in:hover{background:#e3edf9;color:#2f6bb3}
  .ab.ed:hover{background:#f4ecd9;color:#9a6b1f}
  .ab.rm:hover{background:#fbe9e7;color:#c04531}
  .ab.rs:hover{background:#e2f3e8;color:#2e7d4f}
  /* 文字类操作:规整小胶囊 */
  .chipbtn{display:inline-flex;align-items:center;padding:1px 9px;border:1px solid #dcd8d2;border-radius:11px;background:#fff;
    font-size:11px;line-height:17px;color:var(--text2);cursor:pointer;flex:none;transition:all .12s;user-select:none;white-space:nowrap}
  .chipbtn:hover{border-color:#9db9dd;color:#2f6bb3;background:#f3f8ff}
  .chipbtn.muted{opacity:.55;cursor:default;border-style:dashed}
  .chipbtn.muted:hover{border-color:#dcd8d2;color:var(--text2);background:#fff}
  .wdrag{cursor:grab}.wdrag:active{cursor:grabbing}
  /* 规划池行 */
  .mlist{padding:6px 18px}
  .mrow{border-top:1px solid #f4f3f1;display:flex;align-items:center;gap:9px;padding:10px 0;min-height:44px}
  .mrow:first-child{border-top:none}
  .mrow .name{flex:1;font-size:13.5px;min-width:0;word-break:break-word}
  .mrow.dim .name{color:var(--text3)}
  .crumb{font-size:11px;color:#7a6ea8;background:#efeaf9;padding:0 8px;border-radius:10px;flex:none;max-width:220px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .type{font-size:11.5px;padding:1px 9px;border-radius:10px;flex:none}
  .type.work{background:#fdf1e3;color:#b2701f}.type.growth{background:#e3edf9;color:#2f6bb3}
  .nm{font-size:11px;color:#2f6bb3;background:#e3edf9;padding:0 8px;border-radius:10px;flex:none;line-height:18px}
  .nm.full{color:#2e7d4f;background:#e2f3e8}
  .datechip{font-size:11px;color:var(--text3);background:#f4f3f1;padding:0 8px;border-radius:10px;flex:none;line-height:18px}
  .mrow .ops{display:flex;gap:2px;flex:none;opacity:.25;transition:opacity .12s}
  .mrow:hover .ops{opacity:1}
  .tcb{width:15px;height:15px;flex:none;cursor:pointer;accent-color:var(--green)}
  .subinp{margin:0 0 10px 26px;display:flex;gap:8px}
  .subinp input{flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:12.5px}
  .subinp button{padding:6px 16px;border:none;border-radius:8px;background:var(--text);color:#fff;font-size:12.5px;cursor:pointer;flex:none}
  .subinp button:hover{opacity:.85}
  /* 甘特 */
  .mgantt{padding:2px 4px;overflow:visible}
  .mg-row{display:grid;grid-template-columns:235px 1fr;align-items:center;min-height:30px}
  @media(max-width:720px){.mg-row{grid-template-columns:110px 1fr}}
  .mg-label{display:flex;align-items:center;padding-right:10px;font-size:12.5px;color:var(--text2);overflow:hidden;white-space:nowrap}
  .mg-label .lt{flex:1 1 auto;min-width:0;overflow:hidden;text-overflow:ellipsis}
  .mg-label .lux{flex:none;margin-right:2px;width:16px;height:16px;line-height:14px;text-align:center;border-radius:50%;
    cursor:pointer;font-size:12px;color:var(--text3);opacity:.3;transition:all .12s}
  .mg-row:hover .mg-label .lux{opacity:.8}
  .mg-label .lux:hover{background:#fbe9e7;color:#c04531;opacity:1}
  .mg-label .gcb{width:13px;height:13px;flex:none;margin-right:5px;cursor:pointer;accent-color:var(--green)}
  .mg-label .nm{margin-left:5px;line-height:16px}
  .mg-track{position:relative;height:26px;border-left:1px solid #eceae7}
  .mg-headrow{min-height:26px}.mg-axis{height:22px;border-bottom:1px solid #eceae7}
  .mg-tick{position:absolute;top:2px;transform:translateX(-50%);color:var(--text3);font-size:11px;white-space:nowrap}
  .mg-tick::before{content:'';position:absolute;left:50%;top:16px;height:6px;border-left:1px solid #e0ddd8}
  .mg-today{position:absolute;top:0;bottom:0;width:0;border-left:2px dashed #d6534f;z-index:1}
  .mg-bar{position:absolute;top:3px;height:20px;border-radius:5px;opacity:.9;cursor:grab;display:flex;align-items:center;
    touch-action:none;min-width:8px}
  .mg-bar:active{cursor:grabbing}
  .mg-bar .mg-txt{color:#fff;font-size:10.5px;font-weight:600;margin:0 auto;pointer-events:none;white-space:nowrap;overflow:hidden}
  .mg-h{position:absolute;top:0;bottom:0;width:8px;cursor:ew-resize}
  .mg-h.l{left:-1px}.mg-h.r{right:-1px}
  .mg-bar.clip{opacity:.72;border-left:2px dotted rgba(255,255,255,.9);border-right:2px dotted rgba(255,255,255,.9)}
  .mg-bar.env{background:transparent!important;border:1.5px dashed;opacity:.6;cursor:pointer}
  .mg-bar.env .mg-txt{color:var(--text2)}
  .mg-bar.ghost{border:1.5px dashed;background:transparent!important;opacity:.5;cursor:pointer;top:4px;height:17px}
  .mg-bar.ghost:hover{opacity:.85;background:rgba(0,0,0,.03)!important}
  .mg-bar.done{opacity:.55}
  .mg-bar.open{box-shadow:0 0 0 2px rgba(59,130,214,.35),0 1px 2px rgba(0,0,0,.08)}
  .mg-caret{display:inline-block;width:13px;color:var(--text3);font-size:10px;transition:transform .12s;user-select:none;flex:none}
  .mg-caret.open{transform:rotate(90deg);color:var(--text2)}
  .mg-label.haskids{cursor:pointer}
  .mg-row[data-rowtid] .mg-label{cursor:grab}
  .mg-row.rowdrag{opacity:.35}
  .mg-row.rowover-b{box-shadow:inset 0 2.5px 0 var(--green)}
  .mg-row.rowover-a{box-shadow:inset 0 -2.5px 0 var(--green)}
  .mg-row.rowdone .mg-label .lt{text-decoration:line-through;color:var(--text3)}
  .mg-row.openrow .mg-label{white-space:normal}
  .mg-row.openrow .mg-label .lt{white-space:normal;overflow:visible;text-overflow:clip;word-break:break-word;line-height:1.45;padding:3px 0}
  .mg-addrow .mg-addinp{width:100%;padding:4px 9px;border:1px dashed #d8d4cf;border-radius:7px;font-size:12px;background:transparent}
  .mg-addrow .mg-addinp:focus{outline:none;border-color:var(--text2);background:#fff}
  .mg-drop{border:1.5px dashed #d8d4cf;border-radius:7px;display:flex;align-items:center}
  .mg-drop .mg-drophint{font-size:11.5px;color:var(--text3);padding-left:10px}
  .mg-drop.mg-over,.mg-track.mg-over{background:#eef7f0;border-color:var(--green)}
  .mg-empty{color:var(--text3);font-size:12px;padding-left:8px}
  /* 大纲 */
  .olwrap{padding:12px 18px}
  .olrow{display:flex;align-items:center;gap:8px;padding:7px 0;border-top:1px solid #f6f5f3;min-height:36px}
  .olrow:first-child{border-top:none}
  .olrow .name{font-size:13.5px;min-width:0;word-break:break-word}
  .olrow.done .name{color:var(--text3);text-decoration:line-through}
  .olrow .ops{margin-left:auto;display:flex;gap:2px;flex:none;opacity:.2;transition:opacity .12s}
  .olrow:hover .ops{opacity:1}
  /* 周卡/日页 */
  .wcol{padding:16px 18px}
  .wcol h3{font-size:14.5px;font-weight:650;margin-bottom:10px;display:flex;align-items:baseline;gap:8px}
  .wcol h3 .rng{font-size:12px;color:var(--text3);font-weight:400}
  .donesec{margin-top:12px;padding-top:10px;border-top:1px dashed var(--border)}
  .donesec .dh{font-size:12px;color:var(--text3);margin-bottom:4px}
  .dayrow{display:flex;align-items:center;gap:9px;padding:8px 0;border-top:1px solid #f6f5f3;min-height:38px}
  .dayrow:first-child{border-top:none}
  .dayrow .name{flex:1;font-size:13.5px;min-width:0;word-break:break-word}
  .dayrow.done .name{color:var(--text3);text-decoration:line-through}
  .dayrow .ops{display:flex;gap:2px;flex:none;opacity:.25;transition:opacity .12s}
  .dayrow:hover .ops{opacity:1}
  .srcbadge{font-size:10.5px;padding:0 7px;border-radius:9px;flex:none;line-height:17px}
  .srcbadge.work{background:#fdf1e3;color:#b2701f}.srcbadge.growth{background:#e3edf9;color:#2f6bb3}.srcbadge.free{background:#f1f0ee;color:#8a847d}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:900px){.grid2{grid-template-columns:1fr}}
  /* 全景图 */
  .graphwrap{position:relative}
  #graphCanvas{cursor:grab;border-radius:12px}
  #graphCanvas.dragging{cursor:grabbing}
  #graphTip{position:absolute;display:none;background:#26221d;color:#fff;font-size:12px;padding:6px 10px;border-radius:7px;
    pointer-events:none;z-index:5;max-width:280px;line-height:1.5}
  #graphLegend{position:absolute;left:12px;bottom:10px;display:flex;flex-wrap:wrap;gap:4px 14px;font-size:11.5px;color:var(--text2);
    background:rgba(255,255,255,.85);padding:6px 10px;border-radius:8px;pointer-events:none}
  #graphLegend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px}
  .gfilters{position:absolute;right:12px;top:10px;display:flex;gap:8px;font-size:12px;background:rgba(255,255,255,.9);
    padding:6px 10px;border-radius:8px;align-items:center}
  .gfilters label{display:flex;align-items:center;gap:4px;cursor:pointer;color:var(--text2)}
  #graphLoading{position:absolute;inset:0;display:none;align-items:center;justify-content:center;font-size:13px;color:var(--text3)}
  /* toast & 登录 & 弹层 */
  #toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(18px);background:#26221d;color:#fff;
    font-size:13px;padding:10px 20px;border-radius:22px;opacity:0;pointer-events:none;transition:all .25s;z-index:99;max-width:80vw}
  #toast.show{opacity:.95;transform:translateX(-50%)}
  #login{position:fixed;inset:0;background:var(--bg);z-index:50;display:none;align-items:center;justify-content:center}
  #login.show{display:flex}
  #login .box{background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);padding:34px 38px;width:330px}
  #login h3{font-size:17px;margin-bottom:4px}
  #login p{font-size:12.5px;color:var(--text3);margin-bottom:16px}
  #login input{width:100%;padding:10px 13px;border:1px solid var(--border);border-radius:9px;font-size:14px;margin-bottom:12px}
  #login button{width:100%;padding:10px;border:none;border-radius:9px;background:var(--text);color:#fff;font-size:14px;cursor:pointer}
  #login .err{color:var(--red);font-size:12px;margin-top:8px;display:none}
  #modal{position:fixed;inset:0;background:rgba(30,26,20,.35);z-index:60;display:none;align-items:flex-start;justify-content:center;padding-top:12vh}
  #modal.show{display:flex}
  #modal .box{background:#fff;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.18);width:min(480px,92vw);padding:20px 22px;max-height:64vh;display:flex;flex-direction:column}
  #modal h3{font-size:15px;margin-bottom:4px}
  #modal .mhint{font-size:12px;color:var(--text3);margin-bottom:10px}
  #modal input{padding:9px 12px;border:1px solid var(--border);border-radius:9px;font-size:13.5px;margin-bottom:10px}
  #modal .list{overflow-y:auto;flex:1;min-height:0}
  #modal .cand{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px}
  #modal .cand:hover{background:#f4f2ef}
  #modal .cand .cc{font-size:11px;color:var(--text3);margin-left:auto;flex:none}
  #modal .topopt{border:1px dashed #d8d4cf;border-radius:8px;margin-bottom:8px;color:var(--text2)}
  .inedit{padding:3px 8px;border:1px solid var(--blue);border-radius:6px;font-size:inherit;font-family:inherit;width:100%;min-width:120px}
  /* 编辑弹窗 */
  #editPop{position:fixed;inset:0;background:rgba(30,26,20,.35);z-index:60;display:none;align-items:flex-start;justify-content:center;padding-top:16vh}
  #editPop.show{display:flex}
  #editPop .box{background:#fff;border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.18);width:min(430px,92vw);padding:20px 22px;display:flex;flex-direction:column;gap:11px}
  #editPop h3{font-size:15px}
  #editPop input,#editPop select{padding:8px 11px;border:1px solid var(--border);border-radius:8px;font-size:13.5px}
  .eprow{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text2)}
  .eprow select{flex:1;min-width:0}
  .epbtns{display:flex;justify-content:flex-end;gap:8px;margin-top:2px}
  #epOk{padding:8px 20px;border:none;border-radius:8px;background:var(--text);color:#fff;font-size:13px;cursor:pointer}
  /* 任务池:已分配深色 + 拖拽反馈 */
  .pcard{cursor:grab}
  .pcard:active{cursor:grabbing}

<body>

<div id="toast"></div>
<script>
/* ================= 基础助手 ================= */
const $=id=>document.getElementById(id);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const pad2=n=>String(n).padStart(2,'0');
function fmtDate(d){return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());}
function parseD(s){return new Date(s+'T00:00:00');}
function addDays(ds,n){const d=parseD(ds);d.setDate(d.getDate()+n);return fmtDate(d);}
function dayDiff(a,c){return Math.round((parseD(c)-parseD(a))/864e5);}
function mondayOf(d){const x=new Date(d);const dow=(x.getDay()+6)%7;x.setDate(x.getDate()-dow);x.setHours(0,0,0,0);return x;}
const today=()=>fmtDate(new Date());
const ymOf=ds=>ds.slice(0,7);
function nextMonth(ym,k=1){const[y,m]=ym.split('-').map(Number);const d=new Date(y,m-1+k,1);return d.getFullYear()+'-'+pad2(d.getMonth()+1);}
function daysInMonth(ym){const[y,m]=ym.split('-').map(Number);return new Date(y,m,0).getDate();}
const fmtMD=ds=>{const p=(ds||'').split('-');return(+p[1])+'/'+(+p[2]);};
const WD=['日','一','二','三','四','五','六'];
function weekLabel(mon){const d=parseD(mon);return `${d.getMonth()+1}月第${Math.ceil((d.getDate()+ (new Date(d.getFullYear(),d.getMonth(),1).getDay()+6)%7 )/7)}周`;}
let toastTimer=null;
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2600);}

/* ================= 状态 ================= */
let KEY=localStorage.getItem('tg_key')||'';
let DATA=null,MAP=new Map(),KIDS=new Map();
let curPage='overview';
let viewMonth=ymOf(today());
let viewWeekMon=fmtDate(mondayOf(new Date()));
let viewDay=today();
let monthMode='gantt';
const expanded=new Set();
const goalOpen=new Set();   // 年度目标卡展开态(目标 id)
let dragged=null;

/* ================= API ================= */
async function api(method,path,body){
  const r=await fetch(path,{method,headers:{'Content-Type':'application/json','x-dash-key':KEY},body:body?JSON.stringify(body):undefined});
  if(r.status===401){showLogin(true);throw Object.assign(new Error('unauthorized'),{status:401});}
  const j=await r.json().catch(()=>({}));
  if(!r.ok)throw Object.assign(new Error(j.error||('HTTP '+r.status)),{status:r.status,body:j});
  return j;
}
async function reload(){DATA=await api('GET','/api/data');buildIndex();renderAll();}
function buildIndex(){
  MAP=new Map();KIDS=new Map();
  for(const t of DATA.tasks)MAP.set(t.id,t);
  for(const t of DATA.tasks){if(t.parent_id!=null){if(!KIDS.has(t.parent_id))KIDS.set(t.parent_id,[]);KIDS.get(t.parent_id).push(t);}}
  const cmp=(a,b)=>((a.sort??1e12)-(b.sort??1e12))||(a.id-b.id);
  for(const arr of KIDS.values())arr.sort(cmp);
  rebuildTags();
}
async function mutate(fn,okMsg){
  try{const r=await fn();await reload();if(okMsg)toast(okMsg);return r;}
  catch(e){if(e.status===401)return;console.error(e);
    if(e.status===409)toast('该任务今天已经在待办里了');
    else toast('操作失败:'+e.message);
    try{await reload();}catch(_){}}
}
const patchTask=(id,f,msg)=>mutate(()=>api('PATCH','/api/task/'+id,f),msg);
const createTask=(f,msg)=>mutate(()=>api('POST','/api/task',f),msg||'已创建 ✓');
const toggleDone=t=>{const leaf=isLeaf(t);
  return mutate(()=>api('POST',`/api/task/${t.id}/toggle-done`),
    t.status==='done'?(leaf?'已重新打开':'整棵子树已重开'):(leaf?'完成 ✓':`整棵子树标记完成(${t.leaves}项) ✓`));};

/* ================= 树助手 ================= */
const kidsOf=id=>KIDS.get(id)||[];
const isLeaf=t=>kidsOf(t.id).length===0;
function rootOf(t){let c=t;while(c.parent_id!=null&&MAP.has(c.parent_id))c=MAP.get(c.parent_id);return c;}
function crumbs(t){const n=[];let c=t;while(c.parent_id!=null&&MAP.has(c.parent_id)){c=MAP.get(c.parent_id);n.unshift(c.name);}return n.join(' › ');}
function subIdsOf(t){const s=new Set([t.id]);const walk=x=>{for(const k of kidsOf(x.id)){s.add(k.id);walk(k);}};walk(t);return s;}
function subDated(t){const out=[];const walk=x=>{for(const k of kidsOf(x.id)){if(k.start_date&&k.end_date)out.push(k);walk(k);}};walk(t);return out;}
function effRange(t){
  if(t.start_date&&t.end_date)return{s:t.start_date,e:t.end_date,env:false};
  const ds=subDated(t);if(!ds.length)return null;
  let s=null,e=null;for(const d of ds){if(!s||d.start_date<s)s=d.start_date;if(!e||d.end_date>e)e=d.end_date;}
  return{s,e,env:true};
}
const kindOf=t=>rootOf(t).kind||'其他';
/* 标签体系:kind 字段即标签,根的标签决定整棵树;列表动态(服务端 meta 持久化+数据中实际出现的),"其他"永远垫底兜未知 */
const DEFAULT_TAGS=['工作','学习','投资','副业','生活'];
let TAGS=[...DEFAULT_TAGS,'其他'];
const BUILTIN_HEX={'工作':'#e8833a','学习':'#3b82d6','投资':'#b8860b','副业':'#8b62c9','生活':'#d4699e','其他':'#9ca3af'};
const TAGPALETTE=['#0d9488','#c2703d','#5b8def','#a34a8e','#6b8e23','#b05c5c','#7c6bd6','#3a9d8f'];
const tagHex=tg=>BUILTIN_HEX[tg]||TAGPALETTE[[...String(tg)].reduce((h,c)=>(h*31+c.charCodeAt(0))>>>0,0)%TAGPALETTE.length];
function rebuildTags(){
  const set=new Set(Array.isArray(DATA.tags)&&DATA.tags.length?DATA.tags:DEFAULT_TAGS);
  for(const t of DATA.tasks)if(!t.parent_id&&t.kind&&t.kind!=='其他'&&t.kind!=='个人成长')set.add(t.kind);
  set.delete('其他');
  TAGS=[...set,'其他'];
}
const tagOf=t=>{const k=kindOf(t);return TAGS.includes(k)?k:'其他';};
const nextTag=k=>TAGS[(TAGS.indexOf(k)+1)%TAGS.length];
const tagBadge=(t,attr='')=>{const tg=tagOf(t),h=tagHex(tg);
  return`<span class="type" ${attr} style="background:${h}1f;color:${h}${attr?';cursor:pointer':''}" title="${attr?'点击切换标签':'标签(随根任务)'}">${tg}</span>`;};
const kindColor=t=>t.status==='done'?'var(--green)':tagHex(tagOf(t));
const srcBadge=t=>{const h=tagHex(tagOf(t));return`<span class="srcbadge" style="background:${h}1f;color:${h}">${tagOf(t)}</span>`;};
/* 完成记录:每个完成簇只取最高 done 节点(父非done),done_at 落在时间窗内 → 供年/月/周/日各维度"已完成"清单;统一按 done_at=完成历史 */
function doneRoots(inWin){
  return DATA.tasks.filter(t=>t.status==='done'&&t.done_at
    &&(t.parent_id==null||(MAP.get(t.parent_id)||{}).status!=='done')
    &&inWin(t.done_at))
    .sort((a,b)=>String(b.done_at).localeCompare(String(a.done_at)));
}
const winYear=y=>d=>d.slice(0,4)===y;
const winMonth=vm=>d=>d.slice(0,7)===vm;
const winWeek=mon=>d=>d>=mon&&d<=addDays(mon,6);
const winDay=vd=>d=>d===vd;
const prClass=p=>p==='P0'?'P0':p==='P1'?'P1':p==='P2'?'P2':'Px';
const PRCYCLE={null:'P0',P0:'P1',P1:'P2',P2:null};
const nmBadge=t=>(isLeaf(t)||t.status==='done')?'':`<span class="nm${t.done_leaves===t.leaves?' full':''}" title="子树完成度:${t.done_leaves}/${t.leaves}(勾父任务=整棵子树一起完成)">${t.done_leaves}/${t.leaves}</span>`;
const cbHtml=(t,cls)=>`<input type="checkbox" class="${cls}" data-cb="${t.id}" ${t.status==='done'?'checked':''} title="${isLeaf(t)?'':'勾选=整棵子树一起完成 / 取消=整棵重开'}">`;
function bindCbs(root,cls){root.querySelectorAll('input[data-cb].'+cls).forEach(cb=>{
  const t0=MAP.get(+cb.dataset.cb);
  if(t0&&!isLeaf(t0)&&t0.done_leaves>0&&t0.done_leaves<t0.leaves)cb.indeterminate=true;   // 部分完成=半选态
  cb.addEventListener('pointerdown',e=>e.stopPropagation());
  cb.addEventListener('click',e=>e.stopPropagation());
  cb.addEventListener('change',()=>{const t=MAP.get(+cb.dataset.cb);if(t)toggleDone(t);});});}
function inlineEdit(el,cur,commit){
  const inp=document.createElement('input');inp.className='inedit';inp.value=cur;
  el.replaceWith(inp);inp.focus();inp.select();
  let fin=false;
  const end=ok=>{if(fin)return;fin=true;const v=inp.value.trim();inp.replaceWith(el);if(ok&&v&&v!==cur)commit(v);};
  inp.addEventListener('keydown',e=>{if(e.key==='Enter')end(true);if(e.key==='Escape')end(false);});
  inp.addEventListener('blur',()=>end(true));
}

/* ===== 共享子树组件:递归行(整行点击展开)+常驻添加行+统一绑定(编辑弹窗/归档/加子) ===== */
const treeAddRow=(t,d)=>`<div class="subinp" data-psubinp="${t.id}" style="margin:2px 0 10px ${d*22+30}px"><input placeholder="添加一个子任务,回车确认…"><button>添加</button></div>`;
const treeRow=(t,d)=>{
  const open=expanded.has(t.id);
  let h=`<div class="mrow" data-prow="${t.id}" style="padding-left:${d*22}px;cursor:pointer;min-height:38px" title="点击展开/收起">
    <span class="mg-caret${open?' open':''}">▸</span>
    ${cbHtml(t,'tcb')}${nmBadge(t)}
    <span class="name">${esc(t.name)}</span>
    ${t.start_date?`<span class="datechip">${fmtMD(t.start_date)}→${fmtMD(t.end_date)}</span>`:''}
    <span class="ops"><span class="ab ed" data-ed2="${t.id}" title="编辑(名称/标签/优先级)">✎</span><span class="ab rm" data-parc="${t.id}" title="归档删除(整棵子树)">×</span></span>
  </div>`;
  if(open){h+=kidsOf(t.id).map(k=>treeRow(k,d+1)).join('');h+=treeAddRow(t,d+1);}
  return h;};
function bindTreeCommon(root,rerender){
  root.querySelectorAll('.mrow[data-prow]').forEach(row=>row.addEventListener('click',e=>{
    if(e.target.closest('.ab,.badge,.type,.chipbtn,.asg,input,button'))return;
    const id=+row.dataset.prow;expanded.has(id)?expanded.delete(id):expanded.add(id);rerender();}));
  root.querySelectorAll('[data-psubinp]').forEach(box=>{
    const submit=()=>{const v=box.querySelector('input').value.trim();if(!v)return;
      expanded.add(+box.dataset.psubinp);
      createTask({name:v,parent_id:+box.dataset.psubinp},'子任务已创建 ✓');};
    box.querySelector('button').addEventListener('click',submit);
    box.querySelector('input').addEventListener('keydown',e=>{if(e.key==='Enter')submit();});});
  root.querySelectorAll('[data-ed2]').forEach(b=>b.addEventListener('click',()=>openTaskEdit(MAP.get(+b.dataset.ed2))));
  root.querySelectorAll('[data-parc]').forEach(b=>b.addEventListener('click',()=>{
    const t=MAP.get(+b.dataset.parc);if(!t)return;
    if(!confirm(`归档删除「${t.name}」?整棵子树一起归档。`))return;
    mutate(()=>api('DELETE','/api/task/'+t.id),'已归档');}));
}

/* ================= 渲染总控 ================= */
function renderAll(){
  if(!DATA)return;
  renderOverview();renderYear();renderMonth();renderWeek();renderDay();
  $('footTime').textContent='数据 '+new Date().toLocaleTimeString();
}
function showPage(p){
  curPage=p;
  document.querySelectorAll('.nav').forEach(n=>n.classList.toggle('on',n.dataset.page===p));
  document.querySelectorAll('.page').forEach(s=>s.classList.toggle('on',s.id==='page-'+p));
  if(p==='overview'&&DATA)buildGraph(true);
}

/* ================= 总览 ================= */
function renderOverview(){
  const ts=DATA.tasks,gs=DATA.goals;
  const top=ts.filter(t=>!t.parent_id);
  const cm=ymOf(today());
  const mTs=ts.filter(t=>t.month===cm);
  const ex=DATA.executions.filter(e=>e.date===today());
  const k=(num,lab,sub)=>`<div class="card kpi"><div class="num">${num}</div><div class="lab">${lab}</div><div class="sub">${sub}</div></div>`;
  $('ovKpis').innerHTML=
    k(gs.length,'年度目标',gs.filter(g=>g.status==='已完成').length+' 个已完成')+

}
function renderPool(){

       <span class="mg-caret${expanded.has(t.id)?' open':''}" style="width:10px;font-size:9px">▸</span>
       <span class="badge ${prClass(t.priority)}" data-pr="${t.id}" title="点击切换优先级">${t.priority||'–'}</span>
       <span class="pc-t" title="${esc(t.name)}">${esc(t.name)}</span>${nmBadge(t)}

       <span class="ab ed" data-ed2="${t.id}" title="编辑(名称/标签/优先级)">✎</span>

   </div>`;

function bindPoolCardOps(root){
  root.querySelectorAll('[data-pr]').forEach(b=>b.addEventListener('click',()=>{
    const t=MAP.get(+b.dataset.pr);patchTask(t.id,{priority:PRCYCLE[t.priority??'null']??PRCYCLE[t.priority]??null},'优先级已切换');}));
  /* 卡片点击展开子任务面板 */
  root.querySelectorAll('[data-pexp]').forEach(card=>card.addEventListener('click',e=>{
    if(e.target.closest('.ab,.badge,.chipbtn,.asg,input,button'))return;
    const id=+card.dataset.pexp;expanded.has(id)?expanded.delete(id):expanded.add(id);renderPool();}));
  root.querySelectorAll('[data-in]').forEach(b=>b.addEventListener('click',()=>{
    const t=MAP.get(+b.dataset.in);patchTask(t.id,{month:viewMonth,status:'planned'},`已排入 ${viewMonth} ✓`);}));
  root.querySelectorAll('[data-unasg]').forEach(b=>b.addEventListener('click',()=>{
    const t=MAP.get(+b.dataset.unasg);
    patchTask(t.id,{month:null,start_date:null,end_date:null,status:'pool'},'已退回未分配');}));
  root.querySelectorAll('[data-rm]').forEach(b=>b.addEventListener('click',()=>{
    const t=MAP.get(+b.dataset.rm);
    if(!confirm(`归档「${t.name}」?整棵子树一起归档,可从审计恢复。`))return;
    mutate(()=>api('DELETE','/api/task/'+t.id),'已归档');}));
  /* 每组「＋」直建任务 */
  root.querySelectorAll('[data-tadd2]').forEach(b=>b.addEventListener('click',()=>{
    const box=root.querySelector(`[data-pooladd="${CSS.escape(b.dataset.tadd2)}"]`);
    box.style.display=box.style.display==='none'?'flex':'none';box.querySelector('input').focus();}));
  root.querySelectorAll('[data-pooladd]').forEach(box=>{
    const submit=()=>{const v=box.querySelector('input').value.trim();if(!v)return;
      createTask({name:v,kind:box.dataset.pooladd},`已在「${box.dataset.pooladd}」下入池 ✓`);};
    box.querySelector('button').addEventListener('click',submit);
    box.querySelector('input').addEventListener('keydown',e=>{if(e.key==='Enter')submit();});});
  /* 卡片跨组拖拽改标签 */
  root.querySelectorAll('[data-pdrag]').forEach(card=>{
    card.addEventListener('dragstart',()=>{dragged={kind:'pooltag',id:+card.dataset.pdrag};card.style.opacity=.4;});
    card.addEventListener('dragend',()=>{card.style.opacity='';dragged=null;
      root.querySelectorAll('.tagover').forEach(el=>el.classList.remove('tagover'));});});
  root.querySelectorAll('[data-tagdrop]').forEach(zone=>{
    zone.addEventListener('dragover',e=>{if(dragged&&dragged.kind==='pooltag'){e.preventDefault();zone.classList.add('tagover');}});
    zone.addEventListener('dragleave',()=>zone.classList.remove('tagover'));
    zone.addEventListener('drop',e=>{zone.classList.remove('tagover');
      if(!dragged||dragged.kind!=='pooltag')return;e.preventDefault();
      const t=MAP.get(dragged.id),tag=zone.dataset.tagdrop;
      if(!t||tagOf(t)===tag)return;
      patchTask(t.id,{kind:tag},`已移入「${tag}」`);});});
  /* 分类删除(任务归入「其他」)与重命名 */
  root.querySelectorAll('[data-tagdel]').forEach(b=>b.addEventListener('click',()=>{
    const tag=b.dataset.tagdel;
    const affected=DATA.tasks.filter(t=>!t.parent_id&&t.kind===tag);
    if(!confirm(`删除分类「${tag}」?${affected.length?`\n其中 ${affected.length} 个任务将归入「其他」。`:''}`))return;
    (async()=>{
      try{
        for(const t of affected)await api('PATCH','/api/task/'+t.id,{kind:'其他'});
        await api('POST','/api/tags',{tags:TAGS.filter(x=>x!=='其他'&&x!==tag)});
        await reload();toast(`分类「${tag}」已删除${affected.length?`,${affected.length} 个任务归入「其他」`:''}`);
      }catch(e){toast('删除失败:'+e.message);await reload().catch(()=>{});}
    })();}));
  root.querySelectorAll('[data-tagren]').forEach(b=>b.addEventListener('click',()=>{
    const old=b.dataset.tagren;
    const span=b.parentElement.querySelector('.pl-name');
    inlineEdit(span,old,v=>{
      if(v.length>12)return toast('分类名过长(≤12字)');
      if(TAGS.includes(v))return toast('该分类已存在');
      (async()=>{
        try{
          await api('POST','/api/tags',{tags:TAGS.filter(x=>x!=='其他').map(x=>x===old?v:x)});
          const affected=DATA.tasks.filter(t=>!t.parent_id&&t.kind===old);
          for(const t of affected)await api('PATCH','/api/task/'+t.id,{kind:v});
          await reload();toast(`分类「${old}」→「${v}」(${affected.length} 个任务同步)`);
        }catch(e){toast('重命名失败:'+e.message);await reload().catch(()=>{});}
      })();});}));
  const ntBtn=root.querySelector('#newTagBtn'),ntBox=root.querySelector('#newTagBox');
  if(ntBtn){
    ntBtn.addEventListener('click',()=>{ntBox.style.display=ntBox.style.display==='none'?'flex':'none';ntBox.querySelector('input').focus();});
    const submit=()=>{const v=ntBox.querySelector('input').value.trim();
      if(!v)return;if(v.length>12)return toast('分类名过长(≤12字)');
      if(TAGS.includes(v))return toast('该分类已存在');
      mutate(()=>api('POST','/api/tags',{tags:[...TAGS.filter(x=>x!=='其他'),v]}),`分类「${v}」已创建,可拖任务进来`);};
    ntBox.querySelector('button').addEventListener('click',submit);
    ntBox.querySelector('input').addEventListener('keydown',e=>{if(e.key==='Enter')submit();});
  }
}

  const nOk=$('nplOk'),nIn=$('nplName');

}
function renderDoneCards(){

     ${cr?`<span class="crumb" title="${esc(cr)}">${esc(cr)}</span>`:''}
     ${t.leaves>1?`<span class="nm full">${t.done_leaves}/${t.leaves}</span>`:''}
     <span class="datechip">✓ ${fmtMD(t.done_at)}</span>
     <span class="ab rs" data-res="${t.id}" title="恢复(整棵子树重新打开)">↩</span>
     <span class="ab rm" data-arc="${t.id}" title="归档">×</span></div>`;}).join('')
    ||'<div style="color:var(--text3);font-size:12.5px">本月还没有完成的任务</div>';
  $('doneCards').querySelectorAll('[data-res]').forEach(b=>b.addEventListener('click',()=>{
    mutate(()=>api('POST',`/api/task/${b.dataset.res}/restore`),'已恢复,整棵子树重新打开 ✓');}));
  $('doneCards').querySelectorAll('[data-arc]').forEach(b=>b.addEventListener('click',()=>{
    const t=MAP.get(+b.dataset.arc);
    if(!confirm(`归档「${t.name}」?`))return;
    mutate(()=>api('DELETE','/api/task/'+t.id),'已归档');}));
}

/* ================= 月度:大纲视图 ================= */
function monthRelevant(t){
  if(t.month===viewMonth)return true;
  const s0=viewMonth+'-01',e0=viewMonth+'-'+pad2(daysInMonth(viewMonth));
  if(t.start_date&&t.end_date&&t.start_date<=e0&&t.end_date>=s0)return true;
  return kidsOf(t.id).some(monthRelevant);
}
function renderOutline(){
  const roots=DATA.tasks.filter(t=>!t.parent_id&&t.status!=='done'&&monthRelevant(t));
  const rows=[];
  const walk=(t,d)=>{rows.push({t,d});
    if(expanded.has(t.id)){kidsOf(t.id).forEach(k=>walk(k,d+1));rows.push({addFor:t,d:d+1});}};
  roots.forEach(t=>walk(t,0));
  $('olCnt').textContent=roots.length+' 棵树';
  $('outline').innerHTML=rows.map(row=>{
    if(row.addFor)return`<div class="subinp" data-osubinp="${row.addFor.id}" style="margin:2px 0 10px ${(row.d-1)*22+26}px"><input placeholder="添加一个子任务,回车确认…"><button>添加</button></div>`;
    const{t,d}=row;
    return `<div class="olrow${t.status==='done'?' done':''}" style="padding-left:${d*22}px;cursor:pointer" data-olid="${t.id}" title="点击展开/收起">
      <span class="mg-caret${expanded.has(t.id)?' open':''}">▸</span>
      ${cbHtml(t,'tcb')}${nmBadge(t)}
      <span class="name olname">${esc(t.name)}</span>
      ${t.month?`<span class="datechip">📌${t.month}</span>`:''}
      ${t.start_date?`<span class="datechip">${fmtMD(t.start_date)}→${fmtMD(t.end_date)}</span>`:''}
      ${d===0?tagBadge(t):''}
      <span class="ops">
        <span class="ab ed" data-oed="${t.id}" title="改名">✎</span>
        <span class="ab ed" data-orp="${t.id}" title="挂到… / 设为顶层">⇄</span>
        ${t.parent_id?`<span class="ab in" data-oout="${t.id}" title="独立出去">⇱</span>`:''}
        <span class="ab rm" data-oarc="${t.id}" title="归档整棵子树">×</span>
      </span></div>`;
  }).join('')||'<div style="color:var(--text3);font-size:13px">本月还没有任务</div>';
  const root=$('outline');
  bindCbs(root,'tcb');
  root.querySelectorAll('.olrow[data-olid]').forEach(r=>r.addEventListener('click',e=>{
    if(e.target.closest('.ab,.chipbtn,input,button'))return;
    const id=+r.dataset.olid;expanded.has(id)?expanded.delete(id):expanded.add(id);renderOutline();}));
  root.querySelectorAll('[data-oed]').forEach(b=>b.addEventListener('click',()=>{
    const t=MAP.get(+b.dataset.oed);const span=b.closest('.olrow').querySelector('.olname');
    inlineEdit(span,t.name,v=>patchTask(t.id,{name:v},'已改名 ✓'));}));
  root.querySelectorAll('[data-osubinp]').forEach(box=>{
    const submit=()=>{const v=box.querySelector('input').value.trim();if(!v)return;
      createTask({name:v,parent_id:+box.dataset.osubinp},'子任务已创建 ✓');};
    box.querySelector('button').addEventListener('click',submit);
    box.querySelector('input').addEventListener('keydown',e=>{if(e.key==='Enter')submit();});});
  root.querySelectorAll('[data-orp]').forEach(b=>b.addEventListener('click',()=>openReparent(MAP.get(+b.dataset.orp))));
  root.querySelectorAll('[data-oout]').forEach(b=>b.addEventListener('click',()=>{
    const t=MAP.get(+b.dataset.oout);patchTask(t.id,{parent_id:null,month:t.month||viewMonth},'已独立为顶层任务 ✓');}));
  root.querySelectorAll('[data-oarc]').forEach(b=>b.addEventListener('click',()=>{
    const t=MAP.get(+b.dataset.oarc);
    if(!confirm(`归档「${t.name}」?整棵子树一起归档。`))return;
    mutate(()=>api('DELETE','/api/task/'+t.id),'已归档');}));
}
</script>
<script>
/* ================= 甘特(树形,月/周同引擎) ================= */
function ganttBounds(mode){
  if(mode==='month'){const[y,m]=viewMonth.split('-').map(Number);return{start:new Date(y,m-1,1),days:daysInMonth(viewMonth)};}
  return{start:parseD(viewWeekMon),days:7};
}
function idxRaw(b,ds){const d=parseD(ds);
  return Math.round((new Date(d.getFullYear(),d.getMonth(),d.getDate())-new Date(b.start.getFullYear(),b.start.getMonth(),b.start.getDate()))/864e5);}
function indexOfDate(b,ds){return Math.max(0,Math.min(idxRaw(b,ds),b.days-1));}
function dateAtIndex(b,i){const d=new Date(b.start);d.setDate(b.start.getDate()+i);return fmtDate(d);}
const prRank=t=>({P0:0,P1:1,P2:2}[t.priority]??3);
function ganttRoots(b){
  const s0=fmtDate(b.start),e0=dateAtIndex(b,b.days-1);
  const vis=t=>{const r=effRange(t);return!!(r&&r.s<=e0&&r.e>=s0);};
  return DATA.tasks
    .filter(t=>vis(t)&&(!t.parent_id||!MAP.has(t.parent_id)||!vis(MAP.get(t.parent_id))))
    .sort((a,c)=>((a.status==='done')-(c.status==='done'))   // 已完成沉底
      ||((a.sort??1e12)-(c.sort??1e12))||(prRank(a)-prRank(c))||(a.id-c.id));
}
function rerenderTrees(){
  if(monthMode==='gantt')renderGantt('gantt','month');else renderOutline();
  renderGantt('weekGantt','week');
}
function renderGantt(containerId,mode){
  const el=$(containerId);if(!el)return;
  const b=ganttBounds(mode),isMonth=mode==='month';
  const rows=[];
  const walk=(t,d,pRange)=>{
    rows.push({t,d,pRange});
    if(expanded.has(t.id)){
      const r=effRange(t);
      kidsOf(t.id).forEach(k=>walk(k,d+1,r));
      rows.push({addFor:t,d:d+1});
    }};
  const roots=ganttRoots(b);
  roots.forEach(t=>walk(t,0,null));
  if(isMonth)$('mgCnt').textContent=roots.length+' 条时间线';else $('wgCnt').textContent=roots.length+' 条时间线';
  const every=mode==='week'?1:5;
  const ticks=[];for(let d=0;d<b.days;d++){if(d===0||(d+1)%every===0||d===b.days-1){
    const dt=new Date(b.start);dt.setDate(b.start.getDate()+d);
    ticks.push(`<span class="mg-tick" style="left:${d/b.days*100}%">${dt.getMonth()+1}/${dt.getDate()}${mode==='week'?'<br>'+WD[dt.getDay()]:''}</span>`);}}
  const tRaw=idxRaw(b,today());
  const todayLine=(tRaw>=0&&tRaw<b.days)?`<span class="mg-today" style="left:${(tRaw+0.5)/b.days*100}%"></span>`:'';
  let html=`<div class="mg-row mg-headrow"><div class="mg-label"></div><div class="mg-track mg-axis" style="${mode==='week'?'height:34px':''}">${ticks.join('')}${todayLine}</div></div>`;
  if(!rows.length)html+=`<div class="mg-row"><div class="mg-label"></div><div class="mg-track"><span class="mg-empty">${isMonth?'本月暂无排期:把规划池的任务「⏱排期」或拖到下方放置区':'本周暂无排期'}</span></div></div>`;
  html+=rows.map(row=>{
    if(row.addFor)return`<div class="mg-row mg-addrow"><div class="mg-label" style="padding-left:${row.d*16}px"><input class="mg-addinp" data-tadd="${row.addFor.id}" placeholder="添加一个子任务,回车确认…"></div><div class="mg-track"></div></div>`;
    const{t,d,pRange}=row;
    const kids=kidsOf(t.id).length,open=expanded.has(t.id);
    const col=kindColor(t);
    const caret=`<span class="mg-caret${open?' open':''}">▸</span>`;
    let bar='';
    if(t.start_date&&t.end_date){
      const rawS=idxRaw(b,t.start_date),rawE=idxRaw(b,t.end_date);
      if(rawE<0||rawS>b.days-1){
        const edge=rawE<0?0:b.days-1;
        bar=`<div class="mg-bar ro" style="left:${edge/b.days*100}%;width:${100/b.days}%;background:${col};opacity:.3;cursor:default" title="${esc(t.name)} · ${t.start_date}→${t.end_date}(本窗口外)"></div>`;
      }else{
        const si=indexOfDate(b,t.start_date),ei=indexOfDate(b,t.end_date);
        const clip=rawS<0||rawE>b.days-1,handles=(ei-si)>=1;
        bar=`<div class="mg-bar${clip?' clip':''}${t.status==='done'?' done':''}${open?' open':''}" data-tid="${t.id}"
          style="left:${si/b.days*100}%;width:${Math.max((ei-si+1)/b.days*100,100/b.days)}%;background:${col}"
          title="${esc(t.name)} · ${t.start_date}→${t.end_date}${clip?'(延伸出本窗口)':''} · 拖动改期${kids?';父条拖动=整棵子树平移':''}">
          ${handles?'<span class="mg-h l"></span>':''}<span class="mg-txt">${t.status==='done'?'✓ 已完成':esc(tagOf(t))+(t.priority?' · '+t.priority:'')}</span>${handles?'<span class="mg-h r"></span>':''}</div>`;
      }
    }else{
      const r=effRange(t);
      if(r&&r.env){
        const si=indexOfDate(b,r.s),ei=indexOfDate(b,r.e);
        bar=`<div class="mg-bar env" data-envfor="${t.id}" style="left:${si/b.days*100}%;width:${Math.max((ei-si+1)/b.days*100,100/b.days)}%;border-color:${col}"
          title="${esc(t.name)} · 由子任务日期包络(${r.s}→${r.e}),点击展开"><span class="mg-txt">${t.done_leaves===t.leaves?'✓':t.done_leaves+'/'+t.leaves}</span></div>`;
      }else if(pRange){
        const pS=indexOfDate(b,pRange.s),pE=indexOfDate(b,pRange.e);
        bar=`<div class="mg-bar ghost" data-ghost="${t.id}" data-ps="${pS}" data-pe="${pE}" style="left:${pS/b.days*100}%;width:${Math.max((pE-pS+1)/b.days*100,100/b.days)}%;border-color:${col}"
          title="${esc(t.name)} · 未排期:点击=按父范围排期,拖动/拖两端=调整"><span class="mg-h l"></span><span class="mg-h r"></span></div>`;
      }
    }
    const er=effRange(t);
    const luxT=t.start_date?'取消排期(退回规划池)':(er&&er.env?'取消整棵子树的排期':'');
    return`<div class="mg-row${open?' openrow':''}${t.status==='done'?' rowdone':''}" data-rowtid="${t.id}" data-depth="${d}">
      <div class="mg-label${kids?' haskids':''}" data-lab="${t.id}" draggable="true" style="padding-left:${d*16}px" title="${esc(t.name)}${kids?' · 点击展开子任务':''} · 上下拖动调整顺序">
        ${luxT?`<span class="lux" data-lux="${t.id}" title="${luxT}">×</span>`:'<span class="lux" style="visibility:hidden">×</span>'}${caret}${cbHtml(t,'gcb')}<span class="lt">${esc(t.name)}</span>${nmBadge(t)}
      </div><div class="mg-track">${bar}</div></div>`;
  }).join('');
  html+=`<div class="mg-row" style="min-height:38px"><div class="mg-label"></div><div class="mg-track mg-drop">${todayLine}<span class="mg-drophint">${isMonth?'⬆ 从"本月规划池"拖任务到此排期(默认3天,可拖动调整)':'⬇ 从下方"本周任务"拖任务名到此排期/改期'}</span></div></div>`;
  el.innerHTML=html;
  bindGantt(el,b,isMonth);
}
function bindGantt(el,b,isMonth){
  const axis=el.querySelector('.mg-axis');
  const geom=()=>{const r=axis.getBoundingClientRect();return{left:r.left,dayW:r.width/b.days};};
  bindCbs(el,'gcb');
  const toggleExpand=id=>{expanded.has(id)?expanded.delete(id):expanded.add(id);rerenderTrees();};
  /* 实日期条:拖动/两端手柄;父条移动=整棵子树平移 */
  el.querySelectorAll('.mg-bar[data-tid]').forEach(bar=>{
    const t=MAP.get(+bar.dataset.tid);if(!t)return;
    const hasKids=kidsOf(t.id).length>0;
    let mode=null,startX=0,moved=false;
    const preview=(ns,ne)=>{const si=indexOfDate(b,ns),ei=indexOfDate(b,ne);
      bar.style.left=(si/b.days*100)+'%';bar.style.width=(Math.max(ei-si+1,1)/b.days*100)+'%';};
    const down=(e,m)=>{mode=m;moved=false;startX=e.clientX;bar._ns=t.start_date;bar._ne=t.end_date;
      e.preventDefault();e.stopPropagation();
      document.addEventListener('pointermove',move);document.addEventListener('pointerup',up);};
    const move=e=>{if(mode===null)return;if(Math.abs(e.clientX-startX)>4)moved=true;
      const g=geom();const delta=Math.round((e.clientX-startX)/g.dayW);
      let ns=t.start_date,ne=t.end_date;
      if(mode==='move'){ns=addDays(t.start_date,delta);ne=addDays(t.end_date,delta);}
      else if(mode==='l'){ns=addDays(t.start_date,delta);if(ns>ne)ns=ne;}
      else if(mode==='r'){ne=addDays(t.end_date,delta);if(ne<ns)ne=ns;}
      bar._ns=ns;bar._ne=ne;preview(ns,ne);};
    const up=async()=>{document.removeEventListener('pointermove',move);document.removeEventListener('pointerup',up);
      if(mode===null)return;const wasMode=mode;mode=null;
      if(!moved){toggleExpand(t.id);return;}
      const ns=bar._ns,ne=bar._ne;
      if(ns===t.start_date&&ne===t.end_date)return;
      const jobs=[[t.id,ns,ne]];
      if(wasMode==='move'){
        const delta=dayDiff(t.start_date,ns);
        for(const d of subDated(t))jobs.push([d.id,addDays(d.start_date,delta),addDays(d.end_date,delta)]);
      }
      await mutate(async()=>{for(const[id,s2,e2]of jobs)await api('PATCH','/api/task/'+id,{start_date:s2,end_date:e2});},
        `已改期 ${ns}→${ne}${jobs.length>1?` · 子树 ${jobs.length-1} 条同步平移`:''} ✓`);};
    bar.addEventListener('pointerdown',e=>{if(e.button===0)down(e,'move');});
    const hl=bar.querySelector('.mg-h.l');if(hl)hl.addEventListener('pointerdown',e=>{if(e.button===0)down(e,'l');});
    const hr=bar.querySelector('.mg-h.r');if(hr)hr.addEventListener('pointerdown',e=>{if(e.button===0)down(e,'r');});
  });
  /* 幽灵条:未排期子任务,点击=父范围整段落定,拖动=窗口内调整 */
  el.querySelectorAll('.mg-bar.ghost').forEach(bar=>{
    const t=MAP.get(+bar.dataset.ghost);if(!t)return;
    const pS=+bar.dataset.ps,pE=+bar.dataset.pe;
    let mode=null,startX=0,moved=false,origS=0,origE=0;
    const preview=(si,ei)=>{bar.style.left=(si/b.days*100)+'%';bar.style.width=(Math.max(ei-si+1,1)/b.days*100)+'%';};
    const down=(e,m)=>{mode=m;moved=false;startX=e.clientX;origS=pS;origE=pE;
      bar._ns=dateAtIndex(b,pS);bar._ne=dateAtIndex(b,pE);
      e.preventDefault();e.stopPropagation();
      document.addEventListener('pointermove',move);document.addEventListener('pointerup',up);};
    const move=e=>{if(mode===null)return;if(Math.abs(e.clientX-startX)>4)moved=true;
      const g=geom();const delta=Math.round((e.clientX-startX)/g.dayW);
      let ss=origS,ee=origE;
      if(mode==='move'){const span=origE-origS;ss=Math.max(0,Math.min(origS+delta,b.days-1-span));ee=ss+span;}
      else if(mode==='l'){ss=Math.max(0,Math.min(origS+delta,origE));}
      else if(mode==='r'){ee=Math.max(origS,Math.min(origE+delta,b.days-1));}
      bar._ns=dateAtIndex(b,ss);bar._ne=dateAtIndex(b,ee);preview(ss,ee);};
    const up=async()=>{document.removeEventListener('pointermove',move);document.removeEventListener('pointerup',up);
      if(mode===null)return;const wasMode=mode;mode=null;
      if(wasMode!=='move'&&!moved)return;
      await mutate(()=>api('PATCH','/api/task/'+t.id,{start_date:bar._ns,end_date:bar._ne}),`「${t.name}」已排期 ${bar._ns}→${bar._ne} ✓`);};
    bar.addEventListener('pointerdown',e=>{if(e.button===0)down(e,'move');});
    const hl=bar.querySelector('.mg-h.l');if(hl)hl.addEventListener('pointerdown',e=>{if(e.button===0)down(e,'l');});
    const hr=bar.querySelector('.mg-h.r');if(hr)hr.addEventListener('pointerdown',e=>{if(e.button===0)down(e,'r');});
  });
  /* 信封条/标签点击=展开;× 取消排期;子任务添加输入 */
  el.querySelectorAll('.mg-bar.env').forEach(bar=>bar.addEventListener('click',()=>toggleExpand(+bar.dataset.envfor)));
  el.querySelectorAll('.mg-label[data-lab]').forEach(lab=>lab.addEventListener('click',()=>toggleExpand(+lab.dataset.lab)));
  el.querySelectorAll('[data-lux]').forEach(x=>{
    x.addEventListener('pointerdown',e=>e.stopPropagation());
    x.addEventListener('click',e=>{e.stopPropagation();
      const t=MAP.get(+x.dataset.lux);if(!t)return;
      if(t.start_date){   // 自身有排期:取消并退回规划池
        const f={start_date:null,end_date:null};
        if(!t.parent_id&&!t.month)f.month=viewMonth;
        patchTask(t.id,f,'已取消排期,退回规划池');
      }else{              // 信封行:批量取消整棵子树的排期
        const ds=subDated(t);if(!ds.length)return;
        if(!confirm(`取消「${t.name}」整棵子树的排期(共 ${ds.length} 条)?\n任务都保留,仅清除日期。`))return;
        mutate(async()=>{for(const dd of ds)await api('PATCH','/api/task/'+dd.id,{start_date:null,end_date:null});},'已取消整棵子树的排期');
      }});});
  el.querySelectorAll('.mg-addinp').forEach(inp=>{
    inp.addEventListener('pointerdown',e=>e.stopPropagation());
    inp.addEventListener('keydown',e=>{
      if(e.key!=='Enter')return;
      const v=inp.value.trim();if(!v)return;
      createTask({name:v,parent_id:+inp.dataset.tadd},'子任务已创建 ✓');});});
  /* 标签上下拖动排序:仅限同一父层级(排序≠挂靠) */
  el.querySelectorAll('.mg-row[data-rowtid]').forEach(row=>{
    const lab=row.querySelector('.mg-label');
    lab.addEventListener('dragstart',()=>{dragged={kind:'grow',id:+row.dataset.rowtid};row.classList.add('rowdrag');});
    lab.addEventListener('dragend',()=>{row.classList.remove('rowdrag');dragged=null;
      el.querySelectorAll('.rowover-b,.rowover-a').forEach(r=>r.classList.remove('rowover-b','rowover-a'));});
    row.addEventListener('dragover',e=>{
      if(!dragged||dragged.kind!=='grow')return;
      const src=MAP.get(dragged.id),tgt=MAP.get(+row.dataset.rowtid);
      if(!src||!tgt||src.parent_id!==tgt.parent_id)return;
      e.preventDefault();
      const r=row.getBoundingClientRect();const before=e.clientY<r.top+r.height/2;
      row.classList.toggle('rowover-b',before);row.classList.toggle('rowover-a',!before);});
    row.addEventListener('dragleave',()=>row.classList.remove('rowover-b','rowover-a'));
    row.addEventListener('drop',e=>{row.classList.remove('rowover-b','rowover-a');
      if(!dragged||dragged.kind!=='grow')return;e.preventDefault();
      const src=MAP.get(dragged.id),tgt=MAP.get(+row.dataset.rowtid);
      if(!src||!tgt||src.id===tgt.id)return;
      if(src.parent_id!==tgt.parent_id){toast('只能在同一层级内排序;要移动层级用「⇄挂到…」');return;}
      const r=row.getBoundingClientRect();const before=e.clientY<r.top+r.height/2;
      reorderSiblings(src,tgt,before,b);});
  });
  /* 拖入排期:月甘特收"规划池"行,周甘特收"本周任务"卡任务名 */
  el.querySelectorAll('.mg-track').forEach(track=>{
    if(track.classList.contains('mg-axis'))return;
    track.addEventListener('dragover',e=>{if(dragged&&dragged.kind==='plan'){e.preventDefault();track.classList.add('mg-over');}});
    track.addEventListener('dragleave',()=>track.classList.remove('mg-over'));
    track.addEventListener('drop',e=>{track.classList.remove('mg-over');
      if(!dragged||dragged.kind!=='plan')return;e.preventDefault();
      const t=MAP.get(dragged.id);if(!t)return;
      const g=geom();let day=Math.floor((e.clientX-g.left)/g.dayW);day=Math.max(0,Math.min(day,b.days-1));
      const start=dateAtIndex(b,day),end=dateAtIndex(b,Math.min(day+2,b.days-1));
      patchTask(t.id,{start_date:start,end_date:end},`「${t.name}」已排期 ${start}→${end} ✓`);});
  });
}
function reorderSiblings(src,tgt,before,b){
  const list=src.parent_id==null?ganttRoots(b).filter(t=>t.parent_id==null):kidsOf(src.parent_id).slice();
  const without=list.filter(t=>t.id!==src.id);
  let idx=without.findIndex(t=>t.id===tgt.id);if(idx<0)return;
  if(!before)idx+=1;
  without.splice(idx,0,src);
  const jobs=[];
  without.forEach((t,i)=>{const no=(i+1)*10;if(t.sort!==no)jobs.push([t.id,no]);});
  if(!jobs.length)return;
  mutate(async()=>{for(const[id,no]of jobs)await api('PATCH','/api/task/'+id,{sort:no});},'顺序已保存 ✓');
}

/* ================= 任务全景图(自绘力导向,零依赖) ================= */
let GRAPH=null;
const DOMHEX=['#3b82d6','#e8833a','#8b62c9','#3da56b','#d6534f','#d4699e','#a07850'];
const domHex=s=>{let h=0;for(const c of String(s||''))h=(h*31+c.charCodeAt(0))>>>0;return DOMHEX[h%DOMHEX.length];};
const taskHex=t=>t.status==='done'?'#3da56b':(t.status==='pool'||t.status==='goal')?'#c0b9ae':tagHex(tagOf(t));
function taskActive(t){
  if(t.month===ymOf(today()))return true;
  const ws=fmtDate(mondayOf(new Date())),we=addDays(ws,6);
  return!!(t.start_date&&t.end_date&&t.start_date<=we&&t.end_date>=ws);
}
/* 单步力学:斥力+弹簧+向心;cool 为步长系数 */
function graphStep(nodes,edges,idx,cool){
  for(const n of nodes){n.fx=0;n.fy=0;}
  for(let i=0;i<nodes.length;i++)for(let j=i+1;j<nodes.length;j++){
    const a=nodes[i],b=nodes[j];
    let dx=a.x-b.x,dy=a.y-b.y;const d2=dx*dx+dy*dy+0.01;
    if(d2>160000)continue;
    const d=Math.sqrt(d2),f=5400/d2;
    dx/=d;dy/=d;a.fx+=dx*f;a.fy+=dy*f;b.fx-=dx*f;b.fy-=dy*f;
  }
  for(const e of edges){
    const a=nodes[idx[e[0]]],b=nodes[idx[e[1]]];if(!a||!b)continue;
    let dx=b.x-a.x,dy=b.y-a.y;const d=Math.sqrt(dx*dx+dy*dy)+0.01;
    const f=0.06*(d-e[2]);dx/=d;dy/=d;
    a.fx+=dx*f*8;a.fy+=dy*f*8;b.fx-=dx*f*8;b.fy-=dy*f*8;
  }
  for(const n of nodes){
    if(n.pin)continue;
    n.fx+=-n.x*0.011;n.fy+=-n.y*0.011;
    n.x+=Math.max(-24,Math.min(24,n.fx))*cool;
    n.y+=Math.max(-24,Math.min(24,n.fy))*cool;
  }
}
function graphSimulate(nodes,edges,ticks){
  const idx=Object.fromEntries(nodes.map((n,i)=>[n.id,i]));
  for(let t=0;t<ticks;t++)graphStep(nodes,edges,idx,1-t/ticks);
}
/* 实时模拟:gKick 注入能量,30fps 循环逐帧衰减,静止即停(不烧 CPU;不用 rAF——后台/嵌入渲染器会冻结它) */
let gAlpha=0,gAnim=null;
function gKick(a){gAlpha=Math.max(gAlpha,a);if(!gAnim)gLoop();}
function gLoop(){
  gAnim=setTimeout(()=>{
    const G=GRAPH;
    if(!G||curPage!=='overview'||gAlpha<0.03){gAnim=null;gAlpha=0;return;}
    graphStep(G.nodes,G.edges,G.idx,gAlpha);
    gAlpha*=0.97;
    drawGraph();
    gLoop();
  },33);
}
function buildGraph(force){
  const cv=$('graphCanvas');if(!cv||!DATA)return;
  if(GRAPH&&!force){drawGraph();return;}
  const showDone=$('gfDone').checked;
  const focusGoal=$('gfGoal').value?+$('gfGoal').value:null;
  /* 时间尺度筛选:命中任务保留整棵子树+通往簇心的祖先路径 */
  const scale=$('gfScale').value;
  const cm=ymOf(today()),ws=fmtDate(mondayOf(new Date())),we=addDays(ws,6),td=today();
  const todaySet=new Set(DATA.executions.filter(e=>e.date===td&&e.task_id).map(e=>e.task_id));
  const matchScale=t=>{
    if(scale==='year')return rootOf(t).goal_id!=null;
    if(scale==='month')return t.month===cm;
    if(scale==='week')return!!(t.start_date&&t.end_date&&t.start_date<=we&&t.end_date>=ws);
    if(scale==='day')return todaySet.has(t.id);
    return true;};
  const treeHit=t=>matchScale(t)||kidsOf(t.id).some(treeHit);
  /* 目标下拉选项(保持选中) */
  const sel=$('gfGoal');
  const cur=sel.value;
  sel.innerHTML='<option value="">全部簇</option>'+DATA.goals.map(g=>`<option value="${g.id}">${esc(g.name.slice(0,12))}</option>`).join('');
  sel.value=cur;
  const old=GRAPH?Object.fromEntries(GRAPH.nodes.map(n=>[n.id,n])):{};
  const nodes=[],edges=[];
  const add=n=>{const o=old[n.id];
    if(o){n.x=o.x;n.y=o.y;n.pin=o.pin;}else{n.x=(n.x0??0)+(Math.random()-0.5)*30;n.y=(n.y0??0)+(Math.random()-0.5)*30;}
    nodes.push(n);return n;};
  const skip=t=>(!showDone&&t.status==='done');
  let goals=focusGoal?DATA.goals.filter(g=>g.id===focusGoal):DATA.goals;
  if(scale)goals=goals.filter(g=>DATA.tasks.some(t=>!t.parent_id&&t.goal_id===g.id&&treeHit(t)));
  if(!focusGoal)add({id:'@c',label:'⭐ 天罡',type:'center',hex:'#e8b23a',r:15,pin:true,x0:0,y0:0,x:0,y:0});
  const N=goals.length+1;
  goals.forEach((g,i)=>{
    const a=i/N*Math.PI*2,R=focusGoal?0:300;
    add({id:'g'+g.id,label:g.name,type:'goal',hex:domHex(g.domain),r:8+Math.min(6,DATA.tasks.filter(t=>t.goal_id===g.id).length),nav:{page:'year'},x0:Math.cos(a)*R,y0:Math.sin(a)*R,g});
    if(!focusGoal)edges.push(['@c','g'+g.id,330]);
  });
  const topFree=[];
  const addTask=(t,parentNid,depth,anc)=>{
    if(skip(t))return;
    if(scale&&!anc&&!treeHit(t))return;   // 自身/子孙没命中且祖先也没命中 → 裁掉
    const p=old['t'+t.id]?null:nodes.find(n=>n.id===parentNid);
    add({id:'t'+t.id,label:t.name,type:'task',hex:taskHex(t),r:4.5+Math.min(6,Math.sqrt(t.leaves)*1.6),
      active:taskActive(t),nav:{page:'month',task:t},t,
      x0:p?p.x+Math.cos(t.id)*46:0,y0:p?p.y+Math.sin(t.id)*46:0});
    edges.push([parentNid,'t'+t.id,depth===0?165:100]);
    kidsOf(t.id).forEach(k=>addTask(k,'t'+t.id,depth+1,anc||matchScale(t)));
  };
  for(const t of DATA.tasks){
    if(t.parent_id!=null)continue;
    if(focusGoal){if(t.goal_id===focusGoal)addTask(t,'g'+focusGoal,0,false);continue;}
    if(t.goal_id!=null&&DATA.goals.some(g=>g.id===t.goal_id)){if(goals.some(g=>g.id===t.goal_id))addTask(t,'g'+t.goal_id,0,false);}
    else topFree.push(t);
  }
  const freeKept=scale?topFree.filter(treeHit):topFree;
  if(!focusGoal&&freeKept.length){
    const a=(goals.length)/N*Math.PI*2;
    add({id:'@free',label:'独立任务',type:'hub',hex:'#8a8378',r:10,x0:Math.cos(a)*300,y0:Math.sin(a)*300});
    edges.push(['@c','@free',330]);
    freeKept.forEach(t=>addTask(t,'@free',0,false));
  }
  const warm=Object.keys(old).length>0;
  graphSimulate(nodes,edges,warm?15:70);   // 只算个粗形,余下交给实时模拟平滑收敛
  GRAPH={nodes,edges,idx:Object.fromEntries(nodes.map((n,i)=>[n.id,i])),
    scale:GRAPH?GRAPH.scale:1,tx:GRAPH?GRAPH.tx:0,ty:GRAPH?GRAPH.ty:0,fitted:GRAPH?GRAPH.fitted:false};
  if(!GRAPH.fitted){fitGraph();GRAPH.fitted=true;}
  drawGraph();
  gKick(warm?0.5:1);
  $('graphCnt').textContent=` ${nodes.filter(n=>n.type==='task').length} 任务 · ${goals.length} 目标`;
  $('graphLegend').innerHTML=
    `<div><i style="background:#d4a017"></i>年度目标(领域色)</div>`+
    TAGS.filter(tg=>tg!=='其他').map(tg=>`<div><i style="background:${tagHex(tg)}"></i>${tg}</div>`).join('')+
    `<div><i style="background:#c0b9ae"></i>池·待分配</div>
     <div><i style="background:#3da56b"></i>已完成</div><div><i style="border:2px solid #26221d;background:#fff"></i>本月/本周进行中</div>`;
}
function fitGraph(){
  const cv=$('graphCanvas'),G=GRAPH;if(!cv||!G||!G.nodes.length)return;
  const W=cv.clientWidth,H=cv.clientHeight;
  let x0=1e9,y0=1e9,x1=-1e9,y1=-1e9;
  for(const n of G.nodes){x0=Math.min(x0,n.x);y0=Math.min(y0,n.y);x1=Math.max(x1,n.x);y1=Math.max(y1,n.y);}
  const pad=95;
  G.scale=Math.min(1.4,Math.min((W-pad*2)/Math.max(1,x1-x0),(H-pad*2)/Math.max(1,y1-y0)));
  G.tx=W/2-(x0+x1)/2*G.scale;G.ty=H/2-(y0+y1)/2*G.scale;
}
function drawGraph(){
  const cv=$('graphCanvas'),G=GRAPH;if(!cv||!G)return;
  const dpr=window.devicePixelRatio||1,W=cv.clientWidth,H=cv.clientHeight;
  if(cv.width!==W*dpr||cv.height!==H*dpr){cv.width=W*dpr;cv.height=H*dpr;}
  const ctx=cv.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,W,H);
  const sx=n=>n.x*G.scale+G.tx,sy=n=>n.y*G.scale+G.ty;
  ctx.strokeStyle='#e3ded7';ctx.lineWidth=1;
  for(const e of G.edges){const a=G.nodes[G.idx[e[0]]],b=G.nodes[G.idx[e[1]]];if(!a||!b)continue;
    ctx.beginPath();ctx.moveTo(sx(a),sy(a));ctx.lineTo(sx(b),sy(b));ctx.stroke();}
  const rad=n=>n.r*Math.max(0.7,Math.min(1.4,G.scale));
  for(const n of G.nodes){
    const x=sx(n),y=sy(n),r=rad(n);
    ctx.globalAlpha=(n.t&&n.t.status==='done')?0.45:1;
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle=n.hex;ctx.fill();
    if(n.active){ctx.strokeStyle='#26221d';ctx.lineWidth=2;}
    else{ctx.strokeStyle='#fff';ctx.lineWidth=1.5;}
    ctx.stroke();ctx.globalAlpha=1;
  }
  /* 标签后置全量绘制:大节点优先占位,候选位(下/上/右/左/远下/远上)碰撞规避,白描边保证可读 */
  const placed=[];
  const inter=(a,b)=>!(a[2]<b[0]||b[2]<a[0]||a[3]<b[1]||b[3]<a[1]);
  const order=G.nodes.slice().sort((a,b)=>b.r-a.r);
  for(const n of order){
    const x=sx(n),y=sy(n),r=rad(n);
    const big=n.type!=='task';
    const fs=big?11:9.5;
    ctx.font=(big?'600 ':'')+fs+'px system-ui,sans-serif';
    if(n._lb===undefined){
      const maxLen=big?12:8;
      n._lb=n.label.length>maxLen?n.label.slice(0,maxLen)+'…':n.label;
      n._lw=ctx.measureText(n._lb).width;
    }
    const lb=n._lb,w=n._lw;
    const cands=[[x,y+r+3+fs],[x,y-r-6],[x+r+5+w/2,y+fs/2-2],[x-r-5-w/2,y+fs/2-2],
                 [x,y+r+3+fs*2.3],[x,y-r-6-fs*1.3]];
    let best=null,bestOv=1e9;
    for(const[cx,cy]of cands){
      const rect=[cx-w/2-2,cy-fs-1,cx+w/2+2,cy+3];
      let ov=0;for(const p of placed){if(inter(rect,p))ov++;}
      if(ov===0){best=[cx,cy,rect];break;}
      if(ov<bestOv){bestOv=ov;best=[cx,cy,rect];}
    }
    ctx.textAlign='center';
    ctx.lineWidth=3;ctx.strokeStyle='rgba(255,255,255,.88)';
    ctx.strokeText(lb,best[0],best[1]);
    ctx.fillStyle=n.type==='center'?'#6b5410':n.type==='goal'?'#5a5248':(n.t&&n.t.status==='done')?'#a8a29b':'#77716b';
    ctx.fillText(lb,best[0],best[1]);
    placed.push(best[2]);
  }
  G._labels=placed;   // 供调试/探针:标签矩形
}
function graphJump(n){
  if(!n.nav)return;
  if(n.nav.page==='year'){showPage('year');return;}
  const t=n.nav.task;if(!t){showPage('month');return;}
  if(t.month)viewMonth=t.month;
  else if(t.start_date)viewMonth=ymOf(t.start_date);
  let c=t;while(c.parent_id!=null&&MAP.has(c.parent_id)){expanded.add(c.parent_id);c=MAP.get(c.parent_id);}
  showPage('month');renderMonth();
  setTimeout(()=>{
    const row=document.querySelector(`#gantt .mg-row[data-rowtid="${t.id}"]`)||document.querySelector(`#outline [data-olid="${t.id}"]`)||document.querySelector(`#planList .mrow[data-tid="${t.id}"]`);
    if(row){row.scrollIntoView({behavior:'smooth',block:'center'});row.classList.add('flash');setTimeout(()=>row.classList.remove('flash'),1900);}
  },80);
}
(function bindGraphUI(){
  const cv=$('graphCanvas');if(!cv)return;
  const tip=$('graphTip');
  let drag=null,dragKids=null,panning=false,px=0,py=0,downAt=null;
  /* 拖动时整棵子树跟手平移(松手后物理只做微调,不再出现拖尾) */
  const gDesc=id=>{const out=[],st=[id];
    while(st.length){const cur=st.pop();
      for(const e of GRAPH.edges)if(e[0]===cur){out.push(e[1]);st.push(e[1]);}}
    return out.map(k=>GRAPH.nodes[GRAPH.idx[k]]).filter(Boolean);};
  const hit=(mx,my)=>{const G=GRAPH;if(!G)return null;
    for(let i=G.nodes.length-1;i>=0;i--){const n=G.nodes[i];
      const x=n.x*G.scale+G.tx,y=n.y*G.scale+G.ty,r=Math.max(6,n.r*G.scale);
      if((mx-x)**2+(my-y)**2<=(r+3)**2)return n;}
    return null;};
  const pos=e=>{const b=cv.getBoundingClientRect();return[e.clientX-b.left,e.clientY-b.top];};
  cv.addEventListener('pointerdown',e=>{const[mx,my]=pos(e);const n=hit(mx,my);
    downAt=[mx,my];if(n&&n.type!=='center'){drag=n;dragKids=gDesc(n.id);}else{panning=true;px=mx;py=my;}
    cv.classList.add('dragging');try{cv.setPointerCapture(e.pointerId);}catch(_){}});
  cv.addEventListener('pointermove',e=>{const[mx,my]=pos(e);const G=GRAPH;if(!G)return;
    if(drag){
      const nx=(mx-G.tx)/G.scale,ny=(my-G.ty)/G.scale;
      const ddx=nx-drag.x,ddy=ny-drag.y;
      drag.x=nx;drag.y=ny;drag.pin=true;
      if(dragKids)for(const k of dragKids){k.x+=ddx;k.y+=ddy;}
      gKick(0.4);return;}
    if(panning){G.tx+=mx-px;G.ty+=my-py;px=mx;py=my;drawGraph();return;}
    const n=hit(mx,my);
    if(n){tip.style.display='block';tip.style.left=(mx+14)+'px';tip.style.top=(my+10)+'px';
      const t=n.t;
      tip.innerHTML=t?`<b>${esc(t.name)}</b><br>${esc(crumbs(t)||kindOf(t))}<br>${t.status==='done'?'✅ 已完成 '+(t.done_at||''):t.status==='pool'?'📥 池中待分配':'▶ 进行中 '+t.done_leaves+'/'+t.leaves}${t.start_date?'<br>📅 '+t.start_date+' → '+t.end_date:t.month?'<br>📌 '+t.month:''}`
        :(n.g?`<b>${esc(n.g.name)}</b><br>${esc(n.g.domain||'')} · ${n.g.progress||0}%`:esc(n.label));
      cv.style.cursor='pointer';}
    else{tip.style.display='none';cv.style.cursor='grab';}});
  cv.addEventListener('pointerup',e=>{const[mx,my]=pos(e);
    const clicked=downAt&&Math.abs(mx-downAt[0])<4&&Math.abs(my-downAt[1])<4;
    if(clicked){const n=hit(mx,my);if(n)graphJump(n);}
    if(drag)gKick(0.35);   // 松手后让簇继续找平衡直至静止
    drag=null;dragKids=null;panning=false;downAt=null;cv.classList.remove('dragging');});
  cv.addEventListener('wheel',e=>{e.preventDefault();const G=GRAPH;if(!G)return;
    const[mx,my]=pos(e);
    const f=e.deltaY<0?1.15:1/1.15;
    const ns=Math.max(0.25,Math.min(4,G.scale*f));
    G.tx=mx-(mx-G.tx)*(ns/G.scale);G.ty=my-(my-G.ty)*(ns/G.scale);G.scale=ns;drawGraph();},{passive:false});
  $('gfDone').addEventListener('change',()=>{if(DATA)buildGraph(true);});
  $('gfScale').addEventListener('change',()=>{if(DATA){GRAPH=null;buildGraph(true);}});
  $('gfGoal').addEventListener('change',()=>{if(DATA){GRAPH=null;buildGraph(true);}});
  $('gfReset').addEventListener('click',()=>{if(!GRAPH)return;GRAPH.nodes.forEach(n=>{if(n.type!=='center')n.pin=false;});GRAPH=null;$('gfGoal').value='';$('gfScale').value='';buildGraph(true);});
})();

/* ================= 登录与启动 ================= */
function showLogin(s){$('login').classList.toggle('show',s);if(s)setTimeout(()=>$('pw').focus(),50);}
async function tryLogin(){
  KEY=$('pw').value.trim();
  try{await reload();localStorage.setItem('tg_key',KEY);$('pwerr').style.display='none';showLogin(false);}
  catch(e){$('pwerr').style.display='block';}
}
(function boot(){
  document.querySelectorAll('.nav').forEach(n=>n.addEventListener('click',()=>showPage(n.dataset.page)));
  $('reloadBtn').addEventListener('click',()=>reload().then(()=>toast('已刷新 ✓')).catch(()=>{}));
  $('pwbtn').addEventListener('click',tryLogin);
  $('pw').addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();});
  $('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
  $('mdSearch').addEventListener('input',()=>renderMdList($('mdSearch').value.trim().toLowerCase()));
  /* 编辑弹窗 */
  $('epOk').addEventListener('click',saveTaskEdit);
  $('epCancel').addEventListener('click',closeTaskEdit);
  $('editPop').addEventListener('click',e=>{if(e.target.id==='editPop')closeTaskEdit();});
  $('epTag').addEventListener('change',()=>{const nw=$('epTag').value==='__new__';$('epNewRow').style.display=nw?'flex':'none';if(nw)$('epNewTag').focus();});
  $('epName').addEventListener('keydown',e=>{if(e.key==='Enter')saveTaskEdit();if(e.key==='Escape')closeTaskEdit();});
  $('epNewTag').addEventListener('keydown',e=>{if(e.key==='Enter')saveTaskEdit();if(e.key==='Escape')closeTaskEdit();});
  /* 时间导航 */
  $('mPrev').addEventListener('click',()=>{viewMonth=nextMonth(viewMonth,-1);renderMonth();});
  $('mNext').addEventListener('click',()=>{viewMonth=nextMonth(viewMonth,1);renderMonth();});
  $('mToday').addEventListener('click',()=>{viewMonth=ymOf(today());renderMonth();});
  $('wPrev').addEventListener('click',()=>{viewWeekMon=addDays(viewWeekMon,-7);renderWeek();});
  $('wNext').addEventListener('click',()=>{viewWeekMon=addDays(viewWeekMon,7);renderWeek();});
  $('wToday').addEventListener('click',()=>{viewWeekMon=fmtDate(mondayOf(new Date()));renderWeek();});
  $('dPrev').addEventListener('click',()=>{viewDay=addDays(viewDay,-1);renderDay();});
  $('dNext').addEventListener('click',()=>{viewDay=addDays(viewDay,1);renderDay();});
  $('dToday').addEventListener('click',()=>{viewDay=today();renderDay();});
  /* 甘特|大纲切换 */
  $('mSwitch').querySelectorAll('span').forEach(s=>s.addEventListener('click',()=>{
    monthMode=s.dataset.v;
    $('mSwitch').querySelectorAll('span').forEach(x=>x.classList.toggle('on',x===s));
    renderMonth();}));
  /* 顺延 */
  $('rollMonth').addEventListener('click',async()=>{
    const to=nextMonth(viewMonth,1);
    const r=await mutate(()=>api('POST','/api/rollover',{scope:'month',from:viewMonth,to}));
    if(r)toast(r.count?`已把 ${r.count} 项未完成顺延到 ${to} ✓`:'本月没有可顺延的未完成任务');});
  $('rollDay').addEventListener('click',async()=>{
    const to=addDays(viewDay,1);
    const r=await mutate(()=>api('POST','/api/rollover',{scope:'day',from:viewDay,to}));
    if(r)toast(r.count?`已把 ${r.count} 条未完成待办顺延到 ${to} ✓`:'没有可顺延的未完成待办');});
  /* 创建矩阵 */
  $('addGoalBtn').addEventListener('click',()=>{const b=$('goalAddBox');b.style.display=b.style.display==='none'?'block':'none';$('ngName').focus();});
  $('ngOk').addEventListener('click',()=>{
    const name=$('ngName').value.trim();if(!name)return;
    mutate(()=>api('POST','/api/goal',{name,domain:$('ngDomain').value.trim()||null,criteria:$('ngCrit').value.trim()||null}),'目标已创建 ✓')
      .then(()=>{$('ngName').value='';$('ngCrit').value='';$('goalAddBox').style.display='none';});});
  const npSubmit=()=>{const v=$('npName').value.trim();if(!v)return;$('npName').value='';createTask({name:v},'已入池 ✓');};
  $('npOk').addEventListener('click',npSubmit);
  $('npName').addEventListener('keydown',e=>{if(e.key==='Enter')npSubmit();});
  $('addWeekBtn').addEventListener('click',()=>{const b=$('weekAddBox');b.style.display=b.style.display==='none'?'block':'none';$('nwName').focus();});
  const nwSubmit=()=>{const v=$('nwName').value.trim();if(!v)return;$('nwName').value='';
    createTask({name:v,start:viewWeekMon,end:addDays(viewWeekMon,6)},'周任务已创建(默认排本周) ✓');};
  $('nwOk').addEventListener('click',nwSubmit);
  $('nwName').addEventListener('keydown',e=>{if(e.key==='Enter')nwSubmit();});
  const ndSubmit=()=>{const v=$('ndText').value.trim();if(!v)return;$('ndText').value='';
    mutate(()=>api('POST','/api/execution',{text:v,date:viewDay}),'已记下 ✓');};
  $('ndOk').addEventListener('click',ndSubmit);
  $('ndText').addEventListener('keydown',e=>{if(e.key==='Enter')ndSubmit();});
  /* 首载 */
  if(!KEY)showLogin(true);
  else reload().catch(e=>{if(e.status!==401){toast('加载失败:'+e.message);}});
})();
